{% extends "base.html" %}

{% block content %}
  <section class="card">
    <h1 class="card-title">Register</h1>
    <p class="muted">Create your SmartHireX account.</p>

    <form method="post" class="form">
      <label class="label" for="name">Full Name</label>
      <input id="name" name="name" type="text" required maxlength="100" />

      <label class="label" for="email">Email</label>
      <input id="email" name="email" type="email" required maxlength="120" />

      <label class="label" for="password">Password</label>
      <input id="password" name="password" type="password" required />

      <label class="label" for="skills">Skills (comma-separated)</label>
      <input id="skills" name="skills" type="text" placeholder="Python, Flask, SQL" />

      <button type="submit" class="btn">Create Account</button>
    </form>

    <p class="muted">Already have an account?
      <a href="{{ url_for('auth_login') }}">Log in</a>
    </p>
  </section>
{% endblock %}
